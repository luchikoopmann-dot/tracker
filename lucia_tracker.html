<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker · Lucía</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:       #1D9E75;
  --green-bg:    #EAF3DE;
  --green-dark:  #0F6E56;
  --green-txt:   #3B6D11;
  --amber:       #EF9F27;
  --amber-bg:    #FAEEDA;
  --amber-dark:  #BA7517;
  --amber-txt:   #854F0B;
  --red:         #E24B4A;
  --red-bg:      #FCEBEB;
  --red-txt:     #A32D2D;
  --blue:        #378ADD;
  --blue-dark:   #185FA5;
  --bg:          #F5F4F0;
  --surface:     #FFFFFF;
  --border:      rgba(0,0,0,0.08);
  --border-md:   rgba(0,0,0,0.13);
  --text:        #1C1C1A;
  --text-2:      #6B6B66;
  --text-3:      #ABABА4;
  --mono:        'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px 16px 48px;
}

.card {
  background: var(--surface);
  border-radius: 16px;
  border: 0.5px solid var(--border-md);
  padding: 20px 18px 18px;
  width: 100%;
  max-width: 480px;
}

/* ── Header ── */
.hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.hdr-left { display: flex; flex-direction: column; gap: 2px; }
.hdr-name { font-size: 14px; font-weight: 500; }
.hdr-sub  { font-size: 10px; color: var(--text-3); font-family: var(--mono); }
.nav { display: flex; align-items: center; gap: 6px; }
.nb {
  width: 28px; height: 28px;
  background: var(--bg); border: 0.5px solid var(--border-md);
  border-radius: 7px; cursor: pointer;
  font-size: 14px; color: var(--text-2);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s;
}
.nb:hover { background: #ECEAE4; }
.wlbl { font-size: 11px; font-weight: 500; font-family: var(--mono); min-width: 76px; text-align: center; color: var(--text-2); }

/* ── Stats ── */
.stats { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; margin-bottom: 10px; }
.sc { background: var(--bg); border-radius: 10px; padding: 9px 10px; text-align: center; }
.sv { font-size: 20px; font-weight: 500; line-height: 1; }
.sl { font-size: 10px; color: var(--text-3); margin-top: 2px; font-family: var(--mono); }

/* ── Progress bar ── */
.pb-wrap { height: 4px; background: var(--bg); border-radius: 99px; overflow: hidden; margin-bottom: 14px; }
.pb-fill  { height: 100%; border-radius: 99px; transition: width 0.4s, background 0.4s; }

/* ── Legend ── */
.leg { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
.li  { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-3); font-family: var(--mono); }
.ld  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── Day grid ── */
.section-lbl { font-size: 10px; font-weight: 500; color: var(--text-3); font-family: var(--mono); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
.grid { display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap: 5px; margin-bottom: 14px; }

.dc {
  background: var(--bg);
  border: 0.5px solid transparent;
  border-radius: 10px;
  padding: 7px 4px 6px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  transition: border-color 0.15s;
}
.dc.today  { border-color: var(--blue); background: var(--surface); }
.dc.done   { background: #F2FBF6; }

.dn { font-size: 9px; color: var(--text-3); text-align: center; line-height: 1.4; font-family: var(--mono); }
.dn.t { color: var(--blue-dark); font-weight: 500; }

.dots { display: flex; flex-direction: column; gap: 3px; align-items: center; }
.dot {
  width: 11px; height: 11px; border-radius: 50%;
  border: 1.5px solid var(--border-md);
  cursor: pointer;
  transition: transform 0.08s, background 0.1s;
}
.dot:hover  { transform: scale(1.15); }
.dot:active { transform: scale(0.85); }
.dot.ok  { background: var(--green);  border-color: var(--green-dark); }
.dot.dev { background: var(--amber);  border-color: var(--amber-dark); }

.dscore { font-size: 10px; font-weight: 500; font-family: var(--mono); }

.gym-box {
  width: 13px; height: 13px; border-radius: 3px;
  border: 1.5px solid var(--border-md);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.1s;
}
.gym-box.on { background: var(--blue); border-color: var(--blue-dark); }
.gym-ck {
  width: 6px; height: 4px;
  border-left: 1.5px solid #fff; border-bottom: 1.5px solid #fff;
  transform: rotate(-45deg) translateY(-1px); display: none;
}
.gym-box.on .gym-ck { display: block; }

/* ── Note ── */
.note-wrap { background: var(--bg); border-radius: 10px; padding: 10px 12px; margin-bottom: 12px; }
.note-lbl  { font-size: 10px; color: var(--text-3); font-family: var(--mono); margin-bottom: 5px; }
.note-inp  {
  width: 100%; font-size: 12px; border: none; outline: none;
  background: transparent; color: var(--text); resize: none;
  line-height: 1.6; font-family: 'DM Sans', sans-serif;
}
.note-inp::placeholder { color: var(--text-3); }

/* ── Insight ── */
.insight {
  font-size: 12px; color: var(--text-2);
  padding: 9px 12px; border-radius: 10px;
  background: var(--bg); line-height: 1.6;
  border-left: 3px solid var(--green);
}
.insight.warn { border-left-color: var(--amber); }
.insight.bad  { border-left-color: var(--red);   }
.insight strong { color: var(--text); font-weight: 500; }

/* ── Popup overlay ── */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.22);
  align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.popup {
  background: var(--surface);
  border: 0.5px solid var(--border-md);
  border-radius: 14px; padding: 16px;
  width: 230px;
}
.popup-title { font-size: 12px; font-weight: 500; margin-bottom: 12px; color: var(--text-2); font-family: var(--mono); }
.pop-opts { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.popt {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 9px; border-radius: 8px; cursor: pointer;
  font-size: 12px; border: 0.5px solid transparent;
  transition: background 0.1s, border-color 0.1s;
}
.popt:hover { background: var(--bg); }
.popt.selected { background: var(--bg); border-color: var(--border-md); }
.pdot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.pop-note-lbl { font-size: 10px; color: var(--text-3); font-family: var(--mono); margin-bottom: 5px; }
.pop-note {
  width: 100%; font-size: 12px;
  border: 0.5px solid var(--border-md);
  border-radius: 7px; padding: 6px 9px;
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif; resize: none;
  outline: none;
}
.pop-note:focus { border-color: var(--border-md); }
.pop-note::placeholder { color: var(--text-3); }
.pop-actions { display: flex; gap: 6px; margin-top: 12px; }
.pbtn {
  flex: 1; font-size: 11px; padding: 6px 4px;
  border-radius: 7px; cursor: pointer;
  border: 0.5px solid var(--border-md);
  background: none; color: var(--text-2);
  font-family: 'DM Sans', sans-serif;
  transition: background 0.1s;
}
.pbtn:hover { background: var(--bg); }
.pbtn.confirm { background: var(--text); border-color: var(--text); color: #fff; }
.pbtn.confirm:hover { background: #333; }
.pbtn.del { color: var(--text-3); }

.save-lbl { font-size: 10px; color: var(--text-3); text-align: right; height: 14px; margin-bottom: 6px; font-family: var(--mono); }
</style>
</head>
<body>

<div class="card">
  <div class="hdr">
    <div class="hdr-left">
      <span class="hdr-name">Lucía</span>
      <span class="hdr-sub" id="date-range"></span>
    </div>
    <div class="nav">
      <button class="nb" onclick="cw(-1)">‹</button>
      <span class="wlbl" id="wlbl"></span>
      <button class="nb" onclick="cw(1)">›</button>
    </div>
  </div>

  <div class="save-lbl" id="savelbl"></div>
  <div class="stats" id="stats"></div>
  <div class="pb-wrap"><div class="pb-fill" id="pbf"></div></div>

  <div class="leg">
    <div class="li"><div class="ld" style="background:var(--green)"></div>ok según plan</div>
    <div class="li"><div class="ld" style="background:var(--amber)"></div>desvío</div>
    <div class="li"><div class="ld" style="border:1.5px solid var(--border-md)"></div>sin registrar</div>
    <div class="li"><div class="ld" style="background:var(--blue);border-radius:2px"></div>entrenó</div>
  </div>

  <div class="section-lbl">Semana</div>
  <div class="grid" id="grid"></div>

  <div class="note-wrap">
    <div class="note-lbl">nota de hoy</div>
    <textarea class="note-inp" id="today-note" rows="2" placeholder="contexto, picoteo, cómo te sentiste..."></textarea>
  </div>

  <div class="insight" id="insight"></div>
</div>

<!-- Popup -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="popup" id="popup">
    <div class="popup-title" id="popup-title"></div>
    <div class="pop-opts">
      <div class="popt" id="opt-ok" onclick="selectStatus('ok')">
        <div class="pdot" style="background:var(--green)"></div>
        <span>Completa según plan</span>
      </div>
      <div class="popt" id="opt-dev" onclick="selectStatus('dev')">
        <div class="pdot" style="background:var(--amber)"></div>
        <span>Desvío</span>
      </div>
    </div>
    <div class="pop-note-lbl">¿qué pasó? (opcional)</div>
    <textarea class="pop-note" id="pop-note" rows="2" placeholder="comida afuera, postre, me la salté..."></textarea>
    <div class="pop-actions">
      <button class="pbtn del" onclick="clearEntry()">Borrar</button>
      <button class="pbtn" onclick="closePopup()">Cancelar</button>
      <button class="pbtn confirm" onclick="confirmEntry()">Guardar</button>
    </div>
  </div>
</div>

<script>
// ── Constantes ────────────────────────────
const DAYS      = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const MEALS     = ['D','A','M','C'];
const MEAL_FULL = ['Desayuno','Almuerzo','Merienda','Cena'];

// ── Estado ────────────────────────────────
// weekOffset: 0 = esta semana, -1 = anterior, etc.
// La clave de semana es la fecha del LUNES real (YYYY-MM-DD)
// así los datos nunca se pisan cuando avanza el tiempo.

let weekOffset = 0;
let data = {};
let _activeWk, _activeDi, _activeMi, _pendingStatus = null;

// ── Persistencia (localStorage) ───────────
function load() {
  try { data = JSON.parse(localStorage.getItem('lucia_v5') || '{}'); } catch(e) { data = {}; }
}
let saveTimer;
function persist() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    localStorage.setItem('lucia_v5', JSON.stringify(data));
    showSave('guardado ✓');
    setTimeout(() => showSave(''), 2000);
  }, 500);
}
function showSave(m) { document.getElementById('savelbl').textContent = m; }

// ── Cálculo de semana ─────────────────────
// Devuelve el lunes de la semana actual + offset semanas
function getMondayDate(offset) {
  const now = new Date();
  const dow = now.getDay(); // 0=dom, 1=lun ...
  const diff = (dow === 0 ? -6 : 1 - dow); // días hasta el lunes
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff + offset * 7);
  mon.setHours(0,0,0,0);
  return mon;
}

// Clave de semana: "2026-04-07"
function weekKey(offset) {
  const mon = getMondayDate(offset);
  return mon.toISOString().slice(0, 10);
}

// Fechas de los 7 días de la semana
function weekDates(offset) {
  const mon = getMondayDate(offset);
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}

function isToday(d) {
  const n = new Date();
  return d.getDate()===n.getDate() && d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear();
}
function todayIdx(dates) { return dates.findIndex(d => isToday(d)); }

// ── Claves de datos ───────────────────────
// Usamos la fecha del lunes + día + comida para que sean únicas en el tiempo
function mk(wk, di, mi)  { return `${wk}_d${di}_m${mi}`; }
function gk(wk, di)      { return `${wk}_d${di}_gym`; }
function nk(wk, di)      { return `${wk}_d${di}_note`; }
function notk(wk, di, mi){ return `${wk}_d${di}_m${mi}_note`; }

function get(k, def) { return data[k] !== undefined ? data[k] : def; }

// ── Estadísticas ──────────────────────────
function calcStats(wk) {
  let ok = 0, dev = 0, gym = 0, full = 0;
  for (let di = 0; di < 7; di++) {
    let dok = 0;
    for (let mi = 0; mi < 4; mi++) {
      const v = get(mk(wk, di, mi), null);
      if (v === 'ok') { ok++; dok++; }
      else if (v === 'dev') dev++;
    }
    if (get(gk(wk, di), false)) gym++;
    if (dok === 4) full++;
  }
  return { ok, dev, gym, full, pct: Math.round(ok / 28 * 100) };
}

// ── Colores ───────────────────────────────
function pColor(p) { return p >= 80 ? 'var(--green)' : p >= 60 ? 'var(--amber)' : 'var(--red)'; }
function pBg(p)    { return p >= 80 ? 'var(--green-bg)' : p >= 60 ? 'var(--amber-bg)' : 'var(--red-bg)'; }
function pTxt(p)   { return p >= 80 ? 'var(--green-txt)' : p >= 60 ? 'var(--amber-txt)' : 'var(--red-txt)'; }

// ── Render ────────────────────────────────
function render() {
  const wk    = weekKey(weekOffset);
  const dates = weekDates(weekOffset);
  const fmt   = d => d.toLocaleDateString('es-AR', {day:'numeric', month:'short'});

  // Navegación
  document.getElementById('wlbl').textContent =
    weekOffset === 0  ? 'esta sem.' :
    weekOffset === -1 ? 'sem. ant.' :
    weekOffset > 0    ? `+${weekOffset} sem.` : `${weekOffset} sem.`;

  document.getElementById('date-range').textContent =
    fmt(dates[0]) + ' – ' + fmt(dates[6]);

  // Stats
  const { ok, dev, gym, full, pct } = calcStats(wk);

  document.getElementById('stats').innerHTML = `
    <div class="sc">
      <div class="sv" style="color:${pColor(pct)}">${pct}<span style="font-size:12px;font-weight:400">%</span></div>
      <div class="sl">adherencia</div>
    </div>
    <div class="sc">
      <div class="sv" style="color:${full>=5?'var(--green)':full>=3?'var(--amber)':'var(--text)'}">${full}</div>
      <div class="sl">días completos</div>
    </div>
    <div class="sc">
      <div class="sv" style="color:${gym>=5?'var(--green)':gym>=3?'var(--amber)':'var(--text)'}">${gym}</div>
      <div class="sl">entrenamientos</div>
    </div>
  `;

  // Progress bar
  const pbf = document.getElementById('pbf');
  pbf.style.width    = pct + '%';
  pbf.style.background = pColor(pct);

  // Grid
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const ti = todayIdx(dates);

  dates.forEach((date, di) => {
    const today    = isToday(date);
    const okCount  = MEALS.reduce((a,_,mi) => a + (get(mk(wk,di,mi),null)==='ok'?1:0), 0);
    const gymOn    = get(gk(wk,di), false);
    const sc       = okCount===4?'var(--green)':okCount>=2?'var(--amber)':'var(--text-3)';

    const dotsHtml = MEALS.map((_,mi) => {
      const v    = get(mk(wk,di,mi), null);
      const note = get(notk(wk,di,mi), '');
      const cls  = 'dot' + (v==='ok'?' ok':v==='dev'?' dev':'');
      const tip  = note ? `${MEAL_FULL[mi]}: ${note}` : MEAL_FULL[mi];
      return `<div class="${cls}" title="${tip}" onclick="openPopup('${wk}',${di},${mi})"></div>`;
    }).join('');

    const dc = document.createElement('div');
    dc.className = 'dc' + (today?' today':'') + (okCount===4?' done':'');
    dc.innerHTML = `
      <div class="dn${today?' t':''}">${DAYS[di]}<br>
        <span style="font-size:9px;opacity:0.65">${date.getDate()}</span>
      </div>
      <div class="dots">${dotsHtml}</div>
      <div class="dscore" style="color:${sc}">${okCount}/4</div>
      <div class="gym-box${gymOn?' on':''}" onclick="toggleGym('${wk}',${di})">
        <div class="gym-ck"></div>
      </div>
    `;
    grid.appendChild(dc);
  });

  // Nota de hoy
  if (ti >= 0) {
    document.getElementById('today-note').value = get(nk(wk,ti), '');
  }

  // Insight
  const missed = ti>=0 ? MEAL_FULL.filter((_,mi)=>!get(mk(wk,ti,mi),null)) : [];
  let msg='', cls='insight';
  if (pct >= 80) {
    msg = `<strong>Meta cumplida (${pct}%).</strong> La constancia ya es un hábito instalado.`;
  } else if (pct >= 60) {
    cls = 'insight warn';
    msg = `Vas al ${pct}%.${missed.length ? ` Hoy sin registrar: <strong>${missed.join(', ')}</strong>.` : ' Cerca del 80%.'}`;
  } else if (pct > 0) {
    cls = 'insight bad';
    msg = `Al ${pct}%. ${missed.length ? `Hoy pendiente: <strong>${missed.join(', ')}</strong>. ` : ''}Retomá en la próxima, sin compensar.`;
  } else {
    msg = 'Tocá un puntito para registrar tu primera comida del día.';
  }
  const ins = document.getElementById('insight');
  ins.className = cls;
  ins.innerHTML = msg;
}

// ── Popup ─────────────────────────────────
function openPopup(wk, di, mi) {
  _activeWk      = wk;
  _activeDi      = di;
  _activeMi      = mi;
  _pendingStatus = get(mk(wk,di,mi), null);

  document.getElementById('popup-title').textContent = `${MEAL_FULL[mi]} · ${DAYS[di]}`;
  document.getElementById('pop-note').value = get(notk(wk,di,mi), '');

  updateOptHighlight();
  document.getElementById('overlay').classList.add('open');
}

function selectStatus(s) {
  _pendingStatus = (_pendingStatus === s) ? null : s; // toggle
  updateOptHighlight();
}

function updateOptHighlight() {
  document.getElementById('opt-ok') .classList.toggle('selected', _pendingStatus==='ok');
  document.getElementById('opt-dev').classList.toggle('selected', _pendingStatus==='dev');
}

function closePopup() {
  document.getElementById('overlay').classList.remove('open');
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closePopup();
}

function confirmEntry() {
  const note = document.getElementById('pop-note').value.trim();
  const key  = mk(_activeWk, _activeDi, _activeMi);
  const nkey = notk(_activeWk, _activeDi, _activeMi);

  if (_pendingStatus) data[key]  = _pendingStatus;
  else                delete data[key];
  if (note)           data[nkey] = note;
  else                delete data[nkey];

  persist();
  closePopup();
  render();
}

function clearEntry() {
  delete data[mk(_activeWk, _activeDi, _activeMi)];
  delete data[notk(_activeWk, _activeDi, _activeMi)];
  persist();
  closePopup();
  render();
}

function toggleGym(wk, di) {
  const k = gk(wk, di);
  data[k] = !get(k, false);
  persist();
  render();
}

document.getElementById('today-note').addEventListener('change', e => {
  const wk = weekKey(weekOffset);
  const ti = todayIdx(weekDates(weekOffset));
  if (ti >= 0) {
    data[nk(wk, ti)] = e.target.value;
    persist();
  }
});

function cw(d) { weekOffset += d; render(); }

// ── Init ──────────────────────────────────
load();
render();
</script>
</body>
</html>
